services:
  db:
    image: postgres:15-alpine
    container_name: geotask-v2-db-dev
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: geotask
      POSTGRES_PASSWORD: geotask_dev_2024
      POSTGRES_DB: geotask_v2
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geotask"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geotask-v2-pgadmin-dev
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@geotask.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_dev:
    driver: local
