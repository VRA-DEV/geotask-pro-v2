services:
  db:
    image: postgres:15-alpine
    container_name: geotask-v2-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-geotask}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geotask_dev_2024}
      POSTGRES_DB: ${DB_NAME:-geotask_v2}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-geotask}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geotask-v2-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@geotask.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geotask-v2-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-geotask}:${DB_PASSWORD:-geotask_dev_2024}@db:5432/${DB_NAME:-geotask_v2}
      DIRECT_URL: postgresql://${DB_USER:-geotask}:${DB_PASSWORD:-geotask_dev_2024}@db:5432/${DB_NAME:-geotask_v2}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
